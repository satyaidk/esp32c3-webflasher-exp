[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Board configuration
board_build.filesystem = littlefs
board_build.f_cpu = 160000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
board_build.flash_size = 4MB

; Library dependencies
lib_deps =
    ; Core libraries
    me-no-dev/AsyncTCP @ ^1.1.1
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    ; OLED display library
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    ; Optional libraries
    ArduinoOTA @ ^2.0.0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -D__LITTLE_ENDIAN__
    -DCONFIG_LITTLEFS_FOR_IDF_3_2_V4_1_1

; Serial monitor settings
monitor_filters = esp32_exception_decoder
monitor_port = COM3

; Development settings - USB flashing
upload_protocol = esptool

; Optional: OTA configuration (for over-the-air updates after initial flash)
; upload_protocol = espota
; upload_port = smartclock-c3.local
; upload_username = admin
; upload_password = smartclock
